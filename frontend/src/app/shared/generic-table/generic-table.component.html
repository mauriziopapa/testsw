<mat-form-field>
  <mat-label>Filtra</mat-label>
  <input matInput (keyup)="applyFilter($event)" placeholder="Scrivi qui per filtrare" #input />
</mat-form-field>

<table mat-table [dataSource]="dataSourceValues" class="mat-elevation-z8" matSort>
  <ng-container *ngFor="let column of columns" [matColumnDef]="column.columnDef">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>{{column.header}}</th>
    <td mat-cell *matCellDef="let row">{{column.cell(row)}}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <!-- Row shown when there is no matching data. -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" colspan="4">Nessun dato trovato per "{{input.value}}"</td>
  </tr>
</table>

<mat-paginator
  pageSize="50"
  [pageSizeOptions]="[10, 25, 50, 100, 150]"
  aria-label="Seleziona la pagina"
></mat-paginator>
