<mat-card *ngIf="globalFilters && globalFilters.length > 0" class="card-background">
  <mat-card-title></mat-card-title>
  <mat-accordion>
    <mat-expansion-panel
      class="mat-elevation-z0 card-background"
      [expanded]="panelOpenState"
      (opened)="panelOpenState = true"
      (closed)="panelOpenState = false"
    >
      <mat-expansion-panel-header [collapsedHeight]="'2.2em'" [expandedHeight]="'2.5em'">
        <mat-panel-title> Filtri globali </mat-panel-title>
      </mat-expansion-panel-header>

      <mat-card-content class="margin">
        <div class="row">
          <form [formGroup]="globalForm" (ngSubmit)="onSubmit()">
            <div class="container">
              <div class="inner">
                <div *ngFor="let filter of globalFilters">
                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'monthpicker' && filter.name === 'dal_month'"
                  >
                    <input
                      matInput
                      [matDatepicker]="gdpfrom"
                      placeholder="{{filter.label}}"
                      [formControl]="globalFrom"
                    />
                    <mat-datepicker-toggle matSuffix [for]="gdpfrom"></mat-datepicker-toggle>
                    <mat-datepicker
                      #gdpfrom
                      startView="multi-year"
                      (yearSelected)="chosenYearFromHandler($event)"
                      (monthSelected)="chosenMonthFromHandler($event, gdpfrom)"
                      panelClass="example-month-picker"
                    >
                    </mat-datepicker>
                  </mat-form-field>

                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'monthpicker' && filter.name === 'al_month'"
                  >
                    <input
                      matInput
                      [matDatepicker]="gdpto"
                      placeholder="{{filter.label}}"
                      [formControl]="globalTo"
                    />
                    <mat-datepicker-toggle matSuffix [for]="gdpto"></mat-datepicker-toggle>
                    <mat-datepicker
                      #gdpto
                      startView="multi-year"
                      (yearSelected)="chosenYearToHandler($event)"
                      (monthSelected)="chosenMonthToHandler($event, gdpto)"
                      panelClass="month-picker"
                    >
                    </mat-datepicker>
                  </mat-form-field>

                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'autocomplete' && filter.name === 'target'"
                  >
                    <mat-label>{{filter.label}}</mat-label>
                    <mat-select [formControl]="target">
                      <mat-option *ngFor="let type of targets" [value]="type.value">
                        {{type.viewValue}}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>

                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'autocomplete' && filter.label === 'Anno:'"
                  >
                    <mat-label>{{filter.label}}</mat-label>
                    <mat-select [formControl]="globalYear">
                      <mat-option *ngFor="let y of globalYears" [value]="y.value">
                        {{y.viewValue}}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>

                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'autocomplete' && (filter.name === 'dal_anno_ts')"
                  >
                    <mat-label>{{filter.label}}</mat-label>
                    <mat-select [formControl]="globalYearFrom">
                      <mat-option *ngFor="let y of globalYears" [value]="y.value">
                        {{y.viewValue}}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>

                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'autocomplete' && (filter.name === 'al_anno_ts')"
                  >
                    <mat-label>{{filter.label}}</mat-label>
                    <mat-select [formControl]="globalYearTo">
                      <mat-option *ngFor="let y of globalYears" [value]="y.value">
                        {{y.viewValue}}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>

                  <mat-form-field
                    class="field-width"
                    *ngIf="filter.type === 'autocomplete' && filter.name === 'zone_trasporti_ts'"
                  >
                    <mat-label>{{filter.label}}</mat-label>
                    <mat-select [formControl]="globalZone">
                      <mat-option *ngFor="let y of globalZones" [value]="y.value">
                        {{y.viewValue}}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>
                <div>
                  <button mat-stroked-button>
                    CERCA
                    <mat-icon>search</mat-icon>
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </mat-card-content>
    </mat-expansion-panel>
  </mat-accordion>
</mat-card>
