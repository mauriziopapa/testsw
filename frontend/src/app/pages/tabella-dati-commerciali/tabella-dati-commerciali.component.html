<br />
<h1 class="black-text"><b>Tabella Dati Commerciali</b></h1>
<h2 class="label">
  Questa tabella serve per impostare il valore di alcuni KPI nell'area Commerciale.
</h2>
<form [formGroup]="tableForm">
  <mat-table [dataSource]="dataSource" formArrayName="table">
    <!-- Row definitions -->
    <mat-header-row mat-header-row *matHeaderRowDef="displayColumns"></mat-header-row>
    <mat-row *matRowDef="let row; let i = index; columns: displayColumns;"></mat-row>

    <!-- Column definitions -->
    <ng-container matColumnDef="anno">
      <mat-header-cell *matHeaderCellDef>Anno</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text not-allowed"
            matInput
            type="number"
            value=""
            formControlName="anno"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="key">
      <mat-header-cell *matHeaderCellDef>Descrizione</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text not-allowed"
            matInput
            type="text"
            value=""
            formControlName="key"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="value">
      <mat-header-cell *matHeaderCellDef>Valore</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <mat-label></mat-label>
          <div>
            <input
              matInput
              class="right-text"
              [ngClass]="readOnlyCols[index] ? 'not-allowed ' : '' "
              type="number"
              value="0"
              formControlName="value"
              [readonly]="readOnlyCols[index]"
            />
          </div>
        </mat-form-field>
      </mat-cell>
    </ng-container>
  </mat-table>
  <br />
  <button type="button" mat-raised-button color="primary" (click)="save()">Salva</button>
</form>
