<h2>Questa tabella mostra dei dati di riepilogo sui clienti come ad esempio: budget, fatturato, aumento strutturale.
  Vengono mostrati i dati dell'anno in corso.
</h2>


<div class="select-div">
  <label class="year-select-label" for="years">Anno:</label>
  <select class="year-select" id="years" [(ngModel)]="selectedValue" (ngModelChange)="onSelect($event)">
    <option *ngFor="let option of options" [value]="option">{{ option }}</option>
  </select>
</div>

<generic-table 
  [dataSource]="dataSource" 
  [displayedColumns]="displayedColumns" 
  [columns]="columns"></generic-table>
