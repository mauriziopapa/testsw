<table-filters [tableName]="tableName" (tableSearch)="searchByTableFilters($event)"></table-filters>
<br />
<h2 class="label">
  Questa tabella serve per impostare il budget. Il budget dei clienti proviene dal file excel "MO
  1.6_Budget commerciale integrato 2023", mentre il budget dei Nuovi Progetti può essere impostato
  manualmente. La somma dei due valori costituisce il budget totale.
</h2>
<form [formGroup]="form">
  <mat-table [dataSource]="dataSource" formArrayName="budget">
    <!-- Row definitions -->
    <mat-header-row mat-header-row *matHeaderRowDef="displayColumns"></mat-header-row>
    <mat-row *matRowDef="let row; let i = index; columns: displayColumns;"></mat-row>

    <!-- Column definitions -->
    <ng-container matColumnDef="anno">
      <mat-header-cell *matHeaderCellDef>Anno</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            title="anno"
            class="center-text"
            matInput
            type="number"
            value=""
            formControlName="anno"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="descrizione">
      <mat-header-cell *matHeaderCellDef>Descrizione</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            title="descrizione"
            class="center-text"
            matInput
            type="text"
            value=""
            formControlName="descrizione"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="budget">
      <mat-header-cell *matHeaderCellDef>Budget</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <mat-label></mat-label>
          <div>
            <span class="absolute">€</span>
            <input
              title="budget"
              matInput
              class="right-text"
              [ngClass]="readOnlyCols[index] ? 'not-allowed ' : '' "
              type="number"
              value="0"
              formControlName="budget"
              [readonly]="readOnlyCols[index]"
              (change)="calculateTotal()"
            />
          </div>
        </mat-form-field>
      </mat-cell>
    </ng-container>
  </mat-table>
  <br />
  <button type="button" mat-raised-button color="primary" (click)="save()">Salva</button>
</form>
<br />
<tabella-dati-commerciali [tableFilterEvent]="anno"></tabella-dati-commerciali>
