<!--<h1 class="red-text">Tabella Dati Misurazioni Contatori</h1>-->
<table-filters [tableName]="tableName" (tableSearch)="searchByTableFilters($event)"></table-filters>
<br />
<h3 class="black-text">
  Questa tabella mostra solo le materie prime appartenenti alla famiglia PCR (Materie Prime
  Critiche).
</h3>
<form [formGroup]="form">
  <mat-table
    [dataSource]="dataSource"
    formArrayName="costoMateriePrime"
    matSort
    (matSortChange)="sortChange($event)"
  >
    <!-- Row definitions -->
    <mat-header-row mat-header-row *matHeaderRowDef="displayColumns"></mat-header-row>
    <mat-row *matRowDef="let row; let i = index; columns: displayColumns;"></mat-row>

    <!-- Column definitions -->
    <ng-container matColumnDef="anno">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Anno</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text not-allowed"
            matInput
            type="text"
            value=""
            formControlName="anno"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="codice">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Codice</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text not-allowed"
            type="text"
            matInput
            formControlName="codice"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="descrizione">
      <mat-header-cell *matHeaderCellDef>Descrizione</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field class="col-width">
          <input
            class="center-text not-allowed"
            matInput
            type="text"
            value=""
            formControlName="descrizione"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="costo_totale">
      <mat-header-cell *matHeaderCellDef>Costo Totale</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text"
            matInput
            type="number"
            value=""
            formControlName="costo_totale"
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="quantita_totale">
      <mat-header-cell *matHeaderCellDef>Quantità Totale</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text"
            matInput
            type="number"
            value=""
            formControlName="quantita_totale"
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="prezzo_unitario">
      <mat-header-cell *matHeaderCellDef>Prezzo Unitario</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text not-allowed"
            matInput
            type="number"
            value=""
            formControlName="prezzo_unitario"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>

    <ng-container matColumnDef="variazione_anno_precedente">
      <mat-header-cell *matHeaderCellDef>Variazione Anno Precedente</mat-header-cell>
      <mat-cell *matCellDef="let row; let index = index" [formGroupName]="index">
        <mat-form-field>
          <input
            class="center-text not-allowed"
            matInput
            type="number"
            value=""
            formControlName="variazione_anno_precedente"
            readonly
          />
        </mat-form-field>
      </mat-cell>
    </ng-container>
  </mat-table>
  <br />
  <button type="button" mat-raised-button color="primary" (click)="save()">Salva</button>
</form>
